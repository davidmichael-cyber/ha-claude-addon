<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nova</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e94560;
    --accent2: #533483;
    --text: #eaeaea;
    --text-dim: #8892a4;
    --user-bg: #533483;
    --nova-bg: #16213e;
    --border: #2d3561;
    --radius: 12px;
    --font: system-ui, -apple-system, "Segoe UI", sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 15px;
    line-height: 1.5;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
    max-width: 800px;
    margin: 0 auto;
  }

  header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  header .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #4caf50;
    box-shadow: 0 0 6px #4caf50;
    flex-shrink: 0;
  }

  header h1 {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  header .sub {
    font-size: 0.75rem;
    color: var(--text-dim);
    margin-left: auto;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    scroll-behavior: smooth;
  }

  .msg {
    display: flex;
    flex-direction: column;
    max-width: 82%;
  }

  .msg.user { align-self: flex-end; }
  .msg.nova  { align-self: flex-start; }

  .bubble {
    padding: 10px 14px;
    border-radius: var(--radius);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.55;
  }

  .msg.user .bubble {
    background: var(--user-bg);
    border-bottom-right-radius: 3px;
  }

  .msg.nova .bubble {
    background: var(--nova-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }

  .msg-label {
    font-size: 0.7rem;
    color: var(--text-dim);
    margin-bottom: 3px;
    padding: 0 2px;
  }

  .msg.user .msg-label { text-align: right; }

  .typing {
    display: flex;
    gap: 5px;
    padding: 12px 14px;
    background: var(--nova-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    border-bottom-left-radius: 3px;
    width: fit-content;
  }

  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
    40% { transform: translateY(-6px); opacity: 1; }
  }

  #composer {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  #input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    color: var(--text);
    font: inherit;
    font-size: 0.95rem;
    padding: 9px 16px;
    resize: none;
    max-height: 140px;
    outline: none;
    transition: border-color 0.15s;
    line-height: 1.4;
    overflow-y: auto;
  }

  #input:focus { border-color: var(--accent2); }
  #input::placeholder { color: var(--text-dim); }

  #send {
    background: var(--accent2);
    border: none;
    border-radius: 50%;
    width: 42px; height: 42px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, opacity 0.15s;
    align-self: flex-end;
  }

  #send:hover:not(:disabled) { background: var(--accent); }
  #send:disabled { opacity: 0.4; cursor: default; }

  #send svg { width: 18px; height: 18px; fill: white; }

  #error {
    display: none;
    font-size: 0.8rem;
    color: var(--accent);
    padding: 6px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
  }

  /* Scrollbar */
  #messages::-webkit-scrollbar { width: 5px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="dot" id="statusDot"></div>
    <h1>Nova</h1>
    <span class="sub" id="statusText">connecting…</span>
  </header>

  <div id="messages"></div>

  <div id="error"></div>

  <div id="composer">
    <textarea id="input" placeholder="Ask Nova anything…" rows="1"></textarea>
    <button id="send" disabled title="Send">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  const messages$ = document.getElementById('messages');
  const input$ = document.getElementById('input');
  const send$ = document.getElementById('send');
  const error$ = document.getElementById('error');
  const dot$ = document.getElementById('statusDot');
  const statusText$ = document.getElementById('statusText');

  // Derive the API base from the current page URL so ingress paths work.
  const BASE = (() => {
    const u = new URL(window.location.href);
    // Strip trailing slash from pathname
    const path = u.pathname.replace(/\/$/, '');
    return `${u.origin}${path}`;
  })();

  const history = [];

  // --- status ping ---
  async function checkStatus() {
    try {
      const r = await fetch(`${BASE}/health`);
      if (r.ok) {
        dot$.style.background = '#4caf50';
        dot$.style.boxShadow = '0 0 6px #4caf50';
        statusText$.textContent = 'Nova · ready';
        send$.disabled = false;
        return;
      }
    } catch (_) {}
    dot$.style.background = '#e94560';
    dot$.style.boxShadow = '0 0 6px #e94560';
    statusText$.textContent = 'OpenClaw unreachable';
  }

  checkStatus();
  setInterval(checkStatus, 30_000);

  // --- auto-resize textarea ---
  input$.addEventListener('input', () => {
    input$.style.height = 'auto';
    input$.style.height = Math.min(input$.scrollHeight, 140) + 'px';
  });

  input$.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!send$.disabled) submit();
    }
  });

  send$.addEventListener('click', submit);

  function appendMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'You' : 'Nova';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrap.appendChild(label);
    wrap.appendChild(bubble);
    messages$.appendChild(wrap);
    messages$.scrollTop = messages$.scrollHeight;
    return bubble;
  }

  function appendTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg nova';
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = 'Nova';
    const t = document.createElement('div');
    t.className = 'typing';
    t.innerHTML = '<span></span><span></span><span></span>';
    wrap.appendChild(label);
    wrap.appendChild(t);
    messages$.appendChild(wrap);
    messages$.scrollTop = messages$.scrollHeight;
    return wrap;
  }

  function showError(msg) {
    error$.textContent = msg;
    error$.style.display = 'block';
    setTimeout(() => { error$.style.display = 'none'; }, 6000);
  }

  async function submit() {
    const text = input$.value.trim();
    if (!text) return;

    input$.value = '';
    input$.style.height = 'auto';
    send$.disabled = true;
    error$.style.display = 'none';

    history.push({ role: 'user', content: text });
    appendMsg('user', text);

    const typing = appendTyping();

    try {
      const resp = await fetch(`${BASE}/v1/chat/completions`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'nova',
          messages: history.slice(-20),
          stream: false,
        }),
      });

      if (!resp.ok) {
        throw new Error(`HTTP ${resp.status}`);
      }

      const data = await resp.json();
      const reply = data?.choices?.[0]?.message?.content ?? '(empty response)';

      typing.remove();
      history.push({ role: 'assistant', content: reply });
      appendMsg('nova', reply);
    } catch (err) {
      typing.remove();
      showError(`Error: ${err.message}`);
      history.pop(); // remove the user message from history on failure
    } finally {
      send$.disabled = false;
      input$.focus();
    }
  }
</script>
</body>
</html>
